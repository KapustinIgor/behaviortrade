# ─────────────────────────────────────────────────────────────────────────────
# BehaviorTrade — Docker Compose
#
# SECURITY NOTES
# ──────────────
# • Never commit exchange API keys or secrets to version control.
# • All secrets below use env-var substitution with safe, obviously-fake
#   defaults.  Real values must be supplied in a local .env file (never
#   committed) or via a secrets manager in production.
# • Services bind to localhost (127.0.0.1) only; never expose Postgres,
#   Redis, or Neo4j on 0.0.0.0 in production environments.
# • The .env file is listed in .gitignore — do NOT remove that entry.
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-behaviortrade}
      POSTGRES_USER:     ${POSTGRES_USER:-bt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_before_production}
    ports:
      - "127.0.0.1:5432:5432"   # localhost only — never expose publicly
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bt} -d ${POSTGRES_DB:-behaviortrade}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"   # localhost only
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  neo4j:
    image: neo4j:5.18-community
    environment:
      NEO4J_AUTH:    ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-CHANGE_ME_before_production}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "127.0.0.1:7474:7474"   # localhost only
      - "127.0.0.1:7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bt}:${POSTGRES_PASSWORD:-CHANGE_ME_before_production}@postgres:5432/${POSTGRES_DB:-behaviortrade}
      REDIS_URL:    redis://redis:6379/0
      NEO4J_URI:    bolt://neo4j:7687
      NEO4J_USER:   ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-CHANGE_ME_before_production}
      # OPENAI_API_KEY must be set in .env — never hard-coded here
      # EXCHANGE_API_KEY, EXCHANGE_API_SECRET — same: .env only
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - model_data:/app/models
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bt}:${POSTGRES_PASSWORD:-CHANGE_ME_before_production}@postgres:5432/${POSTGRES_DB:-behaviortrade}
      REDIS_URL:    redis://redis:6379/0
    env_file: .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./apps/api:/app
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4

  celery_beat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bt}:${POSTGRES_PASSWORD:-CHANGE_ME_before_production}@postgres:5432/${POSTGRES_DB:-behaviortrade}
      REDIS_URL:    redis://redis:6379/0
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./apps/api:/app
    command: celery -A app.workers.celery_app beat --loglevel=info

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pg_data:
  redis_data:
  neo4j_data:
  model_data:
