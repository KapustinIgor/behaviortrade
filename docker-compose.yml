services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: behaviortrade
      POSTGRES_USER: bt
      POSTGRES_PASSWORD: bt_secret
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bt -d behaviortrade"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  neo4j:
    image: neo4j:5.18-community
    environment:
      NEO4J_AUTH: neo4j/bt_neo4j_secret
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://bt:bt_secret@postgres:5432/behaviortrade
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: bt_neo4j_secret
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - model_data:/app/models
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://bt:bt_secret@postgres:5432/behaviortrade
      REDIS_URL: redis://redis:6379/0
    env_file: .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./apps/api:/app
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4

  celery_beat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://bt:bt_secret@postgres:5432/behaviortrade
      REDIS_URL: redis://redis:6379/0
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./apps/api:/app
    command: celery -A app.workers.celery_app beat --loglevel=info

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pg_data:
  redis_data:
  neo4j_data:
  model_data:
